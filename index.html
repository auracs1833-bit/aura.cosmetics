<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Cosmetics</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f8f8f8;
    direction: rtl;
}

header {
    background: #000;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    padding: 30px;
    display: flex;
    justify-content: center;
}

.product {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    max-width: 450px;
    width: 100%;
}

.product img {
    width: 100%;
    border-radius: 15px;
}

.price {
    font-size: 22px;
    margin-top: 10px;
}

.delivery {
    margin-bottom: 10px;
    color: green;
    font-weight: bold;
}

.total {
    font-size: 20px;
    font-weight: bold;
    margin-top: 10px;
    color: #16a34a;
}

select, input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    background: #25D366;
    color: white;
    border: none;
    padding: 12px;
    margin-top: 15px;
    width: 100%;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
}

button:hover {
    background: #1ebe5d;
}

footer {
    text-align: center;
    padding: 15px;
    background: #000;
    color: white;
    margin-top: 30px;
}
</style>
</head>

<body>

<header>
<h1>Aura Cosmetics</h1>
<p>الدفع عند الاستلام - توصيل لجميع مدن المغرب 🇲🇦</p>
</header>

<div class="container">
<div class="product">

<img src="product.png" alt="Beauty of Joseon">

<h2>Beauty of Joseon SPF50+</h2>

<div class="price">السعر : 250 درهم</div>
<div class="delivery">🚚 التوصيل مجاني</div>

<label>اختر العدد :</label>
<select id="quantity" onchange="calculateTotal()">
</select>

<div class="total" id="total">
💰 المجموع : 250 درهم
</div>

<h3>أدخل معلوماتك:</h3>

<input type="text" id="name" placeholder="الاسم الكامل">
<input type="text" id="phone" placeholder="رقم الهاتف">
<input type="text" id="city" placeholder="المدينة">
<textarea id="address" placeholder="العنوان الكامل"></textarea>

<button onclick="sendOrder()">تأكيد الطلب (الدفع عند الاستلام)</button>

</div>
</div>

<footer>
📞 +212663530438  
<br>© 2026 Aura Cosmetics
</footer>

<script>
// ⚡ Stock
var stock = 50;

// إنشاء الكمية
var quantitySelect = document.getElementById("quantity");
for (var i = 1; i <= stock; i++) {
    var option = document.createElement("option");
    option.value = i;
    option.text = i;
    quantitySelect.appendChild(option);
}

// حساب المجموع
function calculateTotal() {
    var price = 250;
    var quantity = parseInt(document.getElementById("quantity").value);

    if(quantity > stock){
        alert("الكمية أكبر من المخزون (" + stock + ")");
        document.getElementById("quantity").value = stock;
        quantity = stock;
    }

    var total = price * quantity;

    document.getElementById("total").innerHTML =
    "💰 المجموع : " + total + " درهم";
}

// إرسال الطلب
function sendOrder() {
    var quantity = parseInt(document.getElementById("quantity").value);
    var name = document.getElementById("name").value;
    var phone = document.getElementById("phone").value;
    var city = document.getElementById("city").value;
    var address = document.getElementById("address").value;

    if(name === "" || phone === "" || city === "" || address === ""){
        alert("المرجو ملء جميع المعلومات");
        return;
    }

    var total = 250 * quantity;

    var message = "طلب جديد من Aura Cosmetics:%0A"
    + "المنتج: Beauty of Joseon SPF50+%0A"
    + "العدد: " + quantity + "%0A"
    + "المجموع: " + total + " درهم%0A"
    + "🚚 التوصيل: مجاني%0A%0A"
    + "الاسم: " + name + "%0A"
    + "الهاتف: " + phone + "%0A"
    + "المدينة: " + city + "%0A"
    + "العنوان: " + address;

    window.open("https://wa.me/212663530438?text=" + message, "_blank");
}

// أول تحميل
calculateTotal();
</script>

</body>
</html>
